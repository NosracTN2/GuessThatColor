<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess That Color</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="home">

  <main id="home-view" class="home-stack">
    <div class="color-box theme-red" onclick="showColor('red')">
      <div class="logo"><span class="thats">That's</span> <span class="color-name">Red</span>?</div>
    </div>
    <div class="color-box theme-blue" onclick="showColor('blue')">
      <div class="logo"><span class="thats">That's</span> <span class="color-name">Blue</span>?</div>
    </div>
    <div class="color-box theme-yellow" onclick="showColor('yellow')">
      <div class="logo"><span class="thats">That's</span> <span class="color-name">Yellow</span>?</div>
    </div>
    <div class="color-box theme-green" onclick="showColor('green')">
      <div class="logo"><span class="thats">That's</span> <span class="color-name">Green</span>?</div>
    </div>
  </main>

  <main id="color-view" style="display: none;">
    <button onclick="showHome()" class="home-btn" aria-label="Home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </button>
    
    <div id="dynamic-content" class="content-wrapper"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
